<!DOCTYPE html>
<html>
<head>
    <title>Mini E-Commerce</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <script src="https://use.fontawesome.com/releases/v5.8.1/js/all.js"></script>
</head>


<script>
var items = [
    ['001', 'Keyboard Logitek', 60000, 'Keyboard yang mantap untuk kantoran', 'images/logitek.jpg'], 
    ['002', 'Keyboard MSI', 300000, 'Keyboard gaming MSI mekanik', 'images/msi.jpg'],
    ['003', 'Mouse Genius', 50000, 'Mouse Genius biar lebih pinter', 'images/genius.jpeg'],
    ['004', 'Mouse Jerry', 30000, 'Mouse yang disukai kucing', 'images/jerry.jpg']
];

var listBarang = document.getElementById("listBarang");
var cartCount = 0;

function tampilkanBarang(data) {
    listBarang.innerHTML = "";

    data.forEach(function(item){
        var card = `
        <div class="col-4">
            <div class="card mb-4">
                <img src="${item[4]}" class="card-img-top" height="200">
                <div class="card-body">
                    <h5>${item[1]}</h5>
                    <p>${item[3]}</p>
                    <p>Rp ${item[2]}</p>
                    <button class="btn btn-primary addCart">
                        Tambahkan ke Keranjang
                    </button>
                </div>
            </div>
        </div>
        `;
        listBarang.innerHTML += card;
    });

    var tombolCart = document.querySelectorAll(".addCart");
    tombolCart.forEach(function(btn){
        btn.addEventListener("click", function(){
            cartCount++;
            document.getElementById("cart").innerHTML =
                `<i class="fas fa-shopping-cart"></i>(${cartCount})`;
        });
    });
}

tampilkanBarang(items);

// SEARCH
document.getElementById("formItem").addEventListener("submit", function(e){
    e.preventDefault();

    var keyword = document.getElementById("keyword").value.toLowerCase();

    var hasil = items.filter(function(item){
        return item[1].toLowerCase().includes(keyword);
    });

    tampilkanBarang(hasil);
});
</script>
</body>
</html>

<body>

<div class="container">
    
    <!-- NAVBAR -->
    <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand">Mini E-Commerce</a>

        <form class="form-inline" id="formItem">
            <input class="form-control mr-sm-2" type="search" placeholder="Search"
                   id="keyword">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>

        <button class="btn btn-primary" id="cart">
            <i class="fas fa-shopping-cart"></i>(0)
        </button>
    </nav>

    <!-- TEMPAT CARD -->
    <div class="row mt-4" id="listBarang"></div>

</div>
